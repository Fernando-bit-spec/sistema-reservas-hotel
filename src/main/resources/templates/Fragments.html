<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' — Hotel Reservas'">Hotel Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:       #080a0f;
            --surface:  #0e1117;
            --surface2: #141820;
            --surface3: #1c2130;
            --border:   #1f2637;
            --border2:  #2a3349;
            --gold:     #c9a84c;
            --gold2:    #e8c97a;
            --gold-dim: rgba(201,168,76,0.12);
            --text:     #e8eaf0;
            --muted:    #6b7590;
            --muted2:   #8a94ae;
            --danger:   #e05555;
            --success:  #4caf82;
            --info:     #4c8fe0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(76,143,224,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* NAV */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(8,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
        }

        .nav-divider {
            width: 1px;
            height: 24px;
            background: var(--border2);
        }

        .nav-sub {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--muted2);
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: var(--text);
            background: var(--surface2);
        }

        .nav-link.active {
            color: var(--gold);
            background: var(--gold-dim);
        }

        .nav-icon { font-size: 15px; }

        /* PAGE WRAPPER */
        .page {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 40px;
        }

        /* PAGE HEADER */
        .page-header {
            margin-bottom: 40px;
        }

        .page-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--gold);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 6px;
        }

        .page-desc {
            color: var(--muted2);
            font-size: 14px;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: border-color 0.2s, transform 0.2s;
        }

        .card:hover { border-color: var(--border2); }

        /* GRID */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

        /* TABLE */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead tr { background: var(--surface2); }

        th {
            padding: 14px 20px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }

        td {
            padding: 14px 20px;
            font-size: 13px;
            border-top: 1px solid var(--border);
            color: var(--text);
            vertical-align: middle;
        }

        tr:hover td { background: rgba(255,255,255,0.015); }

        /* BADGE */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .badge-green  { background: rgba(76,175,130,0.15); color: var(--success); }
        .badge-red    { background: rgba(224,85,85,0.15);  color: var(--danger); }
        .badge-gold   { background: var(--gold-dim);       color: var(--gold); }
        .badge-blue   { background: rgba(76,143,224,0.15); color: var(--info); }
        .badge-gray   { background: rgba(107,117,144,0.15);color: var(--muted2); }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--gold);
            color: #080a0f;
        }
        .btn-primary:hover { background: var(--gold2); transform: translateY(-1px); }

        .btn-ghost {
            background: transparent;
            color: var(--muted2);
            border: 1px solid var(--border2);
        }
        .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

        .btn-danger {
            background: rgba(224,85,85,0.15);
            color: var(--danger);
            border: 1px solid rgba(224,85,85,0.2);
        }
        .btn-danger:hover { background: rgba(224,85,85,0.25); }

        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }

        /* FORM */
        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted2);
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
        }

        select option { background: var(--surface2); }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .modal-sub {
            font-size: 13px;
            color: var(--muted2);
            margin-bottom: 24px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        /* STATS */
        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted2);
            margin-top: 6px;
            font-weight: 500;
        }

        /* ALERTS */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success { background: rgba(76,175,130,0.12); border: 1px solid rgba(76,175,130,0.25); color: var(--success); }
        .alert-error   { background: rgba(224,85,85,0.12);  border: 1px solid rgba(224,85,85,0.25);  color: var(--danger); }

        /* SECTION TOOLBAR */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .toolbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 600;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fade-up { animation: fadeUp 0.4s ease both; }
        .fade-up-1 { animation-delay: 0.05s; }
        .fade-up-2 { animation-delay: 0.10s; }
        .fade-up-3 { animation-delay: 0.15s; }
        .fade-up-4 { animation-delay: 0.20s; }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .page { padding: 32px 20px; }
            .grid-3, .grid-2 { grid-template-columns: 1fr; }
            .nav-sub, .nav-divider { display: none; }
        }
    </style>
</head>

<!-- NAV FRAGMENT -->
<nav th:fragment="nav(active)">
    <a href="/" class="nav-brand">
        <span class="nav-logo">🏨 Grand Hotel</span>
        <span class="nav-divider"></span>
        <span class="nav-sub">Sistema de Reservas</span>
    </a>
    <div class="nav-links">
        <a th:href="@{/}" th:classappend="${active == 'home'} ? 'active'" class="nav-link">
            <span class="nav-icon">◈</span> Dashboard
        </a>
        <a th:href="@{/quartos}" th:classappend="${active == 'quartos'} ? 'active'" class="nav-link">
            <span class="nav-icon">🛏</span> Quartos
        </a>
        <a th:href="@{/usuarios}" th:classappend="${active == 'usuarios'} ? 'active'" class="nav-link">
            <span class="nav-icon">👤</span> Usuários
        </a>
        <a th:href="@{/reservas}" th:classappend="${active == 'reservas'} ? 'active'" class="nav-link">
            <span class="nav-icon">📋</span> Reservas
        </a>
    </div>
</nav>
</html>
